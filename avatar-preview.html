<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>热血像素头像预览</title>
<style>
  body { background: #1a2030; color: #dde3ee; font-family: system-ui, sans-serif; padding: 20px; }
  h2 { margin: 22px 0 8px; font-size: 15px; color: #9fb0cc; }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
  .cell { text-align: center; }
  .cell .lb { font-size: 10px; color: #8a97ad; margin-top: 3px; }
  .avatar { display: inline-flex; border-radius: 18%; overflow: hidden; line-height: 0;
    box-shadow: 0 0 0 1px rgba(255,255,255,.14), 0 2px 6px rgba(0,0,0,.28); }
  .avatar img { display: block; width: 100%; height: 100%;
    image-rendering: auto; }
  .grid-note { font-size: 12px; color: #6d7a92; margin: 4px 0 14px; }
</style>
</head>
<body>
<h1 style="font-size:18px">清晰像素头像 · 预览（canvas-PNG 路径，与游戏内一致）</h1>
<div class="grid-note">python -m http.server 8765 → http://127.0.0.1:8765/avatar-preview.html</div>
<div id="root"></div>
<script type="module">
import { avatarHtml } from "./js/avatar.js?v=123";

const root = document.getElementById("root");
const NATIONS = ["ENG","ESP","GER","FRA","ITA","POR","BRA","ARG","NED","BEL","CRO","URU","COL","MEX","USA","JPN","KOR","CHN","NGA","SEN","GHA","CIV","MAR","POL","DEN","SWE","NOR","SUI","AUT","TUR","SRB","UKR","SCO","WAL","IRL","AUS"];

function block(title, html) {
  root.insertAdjacentHTML("beforeend", `<h2>${title}</h2><div class="row">${html}</div>`);
}
function cell(html, lb) {
  return `<div class="cell">${html}<div class="lb">${lb}</div></div>`;
}
const person = (id, nat, pos = "MID") => ({ id, name: id, pos, nationality: nat, age: 25 });

// 1) 各国抽样：每国 8 个种子（64px 看细节）
for (const nat of NATIONS) {
  let html = "";
  for (let i = 0; i < 8; i++) {
    html += cell(
      avatarHtml(person(`${nat}-demo-${i}`, nat), { size: 64, kitPrimary: "#c0392b", kitSecondary: "#f8fafc", mood: "neutral" }),
      `${nat}-${i}`
    );
  }
  block(nat, html);
}

// 2) 心情五态（同一人）
{
  let html = "";
  for (const mood of ["neutral","happy","injured","tired","sad"]) {
    html += cell(
      avatarHtml(person("mood-demo-3", "JPN"), { size: 80, mood, kitPrimary: "#2563eb", kitSecondary: "#f8fafc" }),
      mood
    );
  }
  block("心情（同一球员）", html);
}

// 3) 小尺寸可读性
{
  let html = "";
  for (const s of [26, 28, 30, 36, 40, 64, 96]) {
    html += cell(
      avatarHtml(person("size-demo-5", "BRA"), { size: s, kitPrimary: "#16a34a", kitSecondary: "#facc15", mood: "neutral" }),
      `${s}px`
    );
  }
  block("尺寸阶梯", html);
}

// 4) GK 与深色球衣对比
{
  let html = "";
  for (const [kp, ks, lb] of [["#111827","#f8fafc","深黑衣"],["#f8fafc","#111827","白衣"],["#facc15","#1e3a8a","黄蓝"],["#dc2626","#ffffff","红白"]]) {
    html += cell(
      avatarHtml(person("kit-demo-2", "GER", "GK"), { size: 64, kitPrimary: kp, kitSecondary: ks, mood: "neutral" }),
      `GK ${lb}`
    );
  }
  block("门将 + 球衣对比度", html);
}

// 5) 职员
{
  let html = "";
  for (const role of ["coach","scout","doctor","manager"]) {
    html += cell(
      avatarHtml({ id: `staff-${role}`, name: role, role }, { size: 64, role, mood: "neutral" }),
      role
    );
  }
  block("职员（教练/球探/队医/经理）", html);
}
</script>
</body>
</html>
